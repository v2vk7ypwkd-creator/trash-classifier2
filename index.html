<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 분리수거 체크리스트</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            text-align: center;
            padding: 50px 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 400px;
            width: 100%;
        }
        h2 { color: #2ecc71; }
        select {
            width: 100%;
            padding: 10px;
            margin: 20px 0;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background-color: #27ae60; }
        #message { margin-top: 15px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>♻️ 분리수거 체크리스트</h2>
        <p>해당하는 학급을 선택하고 완료 버튼을 눌러주세요.</p>
        
        <select id="classSelect">
            <option value="1학년 1반">1학년 1반</option>
            <option value="1학년 2반">1학년 2반</option>
            <option value="2학년 7반">2학년 7반</option>
            <option value="3학년 1반">3학년 1반</option>
        </select>
        
        <button onclick="submitCompletion()">완료 누르기</button>
        <div id="message"></div>
    </div>

    <script>
        function submitCompletion() {
            const selectedClass = document.getElementById("classSelect").value;
            const messageDiv = document.getElementById("message");
            
            messageDiv.innerHTML = "선생님 카톡으로 알림 전송 요청 중...";
            messageDiv.style.color = "#ff9f43";

            // 깃허브 액션을 원격으로 호출하여 파이썬 코드를 실행하는 API입니다.
            // 아래의 'YOUR_GITHUB_USERNAME'과 'YOUR_REPO_NAME'은 본인의 정보로 꼭 수정해야 합니다!
            fetch('https://api.github.com/repos/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME/actions/workflows/send_kakao.yml/dispatches', {
                method: 'POST',
                headers: {
                    'Accept': 'application/vnd.github.v3+json',
                    // 이 요청을 보내려면 깃허브 토큰(Personal Access Token)이 필요합니다.
                    'Authorization': 'token YOUR_GITHUB_PERSONAL_ACCESS_TOKEN'
                },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: { class_name: selectedClass }
                })
            })
            .then(response => {
                if (response.status === 204) {
                    messageDiv.innerHTML = "✅ 완료 처리 및 선생님께 알림을 전송했습니다!";
                    messageDiv.style.color = "#2ecc71";
                } else {
                    messageDiv.innerHTML = "❌ 전송 실패 (설정을 확인하세요)";
                    messageDiv.style.color = "#e74c3c";
                }
            })
            .catch(error => {
                messageDiv.innerHTML = "❌ 전송 에러 발생";
                messageDiv.style.color = "#e74c3c";
            });
        }
    </script>
</body>
</html>
